project_id = "caluatnails"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3002"
additional_redirect_urls = ["https://127.0.0.1:3002"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Edge Functions
[functions.whatsapp-webhook]
verify_jwt = false

[functions.whatsapp-test]
verify_jwt = false

[functions.brevo-email]
verify_jwt = false

[functions.process-booking-confirmation]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.register-user]
verify_jwt = false

[functions.cron-availability-alert]
enabled = true
verify_jwt = true
import_map = "./functions/cron-availability-alert/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/cron-availability-alert/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/cron-availability-alert/*.html" ]
